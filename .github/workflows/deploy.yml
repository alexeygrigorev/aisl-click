name: deploy

on:
  push:
    branches: [main]
    paths:
      - "redirector/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# OIDC: the runner assumes IAM role aisl-click-deploy, which can ONLY push the zip
# and call update-function-code on this function. No static AWS key, no cloudformation.
# AISL_DEPLOY_ROLE_ARN + AISL_ARTIFACT_BUCKET are GitHub SECRETS (not variables) so the
# account id they contain is masked in the public run logs. Infra changes go through
# scripts/deploy.sh by someone with broader access. Only this repo's main branch can
# assume the role (pinned in its trust policy).
permissions:
  id-token: write   # mint the OIDC token
  contents: read    # actions/checkout

env:
  AWS_REGION: eu-west-1
  ARTIFACT_BUCKET: ${{ secrets.AISL_ARTIFACT_BUCKET }}
  S3_KEY: redirector/latest.zip
  FUNCTION: aisl-click-redirector

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC, no static key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AISL_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Build (arm64)
        working-directory: redirector
        run: |
          rustup target add aarch64-unknown-linux-musl
          cargo build --release --target aarch64-unknown-linux-musl

      - name: Package zip
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import zipfile
          zipfile.ZipFile("dist/bootstrap.zip", "w", zipfile.ZIP_DEFLATED).write(
              "redirector/target/aarch64-unknown-linux-musl/release/bootstrap", "bootstrap")
          PY

      - name: Push zip to artifact bucket
        run: aws s3 cp dist/bootstrap.zip "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.S3_KEY }}"

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --s3-bucket "$ARTIFACT_BUCKET" \
            --s3-key "$S3_KEY"
          # Poll LastUpdateStatus via GetFunction (the role grants GetFunction, not
          # GetFunctionConfiguration, so we don't use the built-in `wait function-updated`).
          for i in $(seq 1 24); do
            st=$(aws lambda get-function --function-name "$FUNCTION" \
                 --query 'Configuration.LastUpdateStatus' --output text)
            echo "LastUpdateStatus=$st"
            [ "$st" = "Successful" ] && exit 0
            [ "$st" = "Failed" ] && { echo "update reported Failed"; exit 1; }
            sleep 5
          done
          echo "update accepted; still InProgress after 120s (settles async)"

      - name: Function status
        if: always()
        run: aws lambda get-function --function-name "$FUNCTION" --query 'Configuration.{State:State,LastUpdate:LastUpdateStatus,CodeSize:CodeSize}' --output table
