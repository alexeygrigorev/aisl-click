AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions deploy access for aisl.click via OIDC — no static key, no IAM user.
  The runner assumes aisl-click-deploy (short-lived, pinned to this repo's main branch)
  to do exactly two things: push the built zip to the artifact bucket and update the
  redirector Lambda's code. That is ALL it can do — no cloudformation, no iam, no
  apigateway. Infra changes go through scripts/deploy.sh (a full CloudFormation deploy)
  by someone with broader access.

Parameters:
  ArtifactBucket:
    Type: String
  GitHubRepo:
    Type: String
    Description: owner/repo allowed to assume the role, e.g. alexeygrigorev/aisl-click
    AllowedPattern: "[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+"

Resources:
  # GitHub's OIDC provider is account-global and not owned by this stack (creating a
  # second one fails). It's referenced by its deterministic ARN below. If your account
  # doesn't have it yet, create it once — see README.
  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aisl-click-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepo}:ref:refs/heads/main"
      Policies:
        - PolicyName: update-lambda-code
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Push the built zip to the artifact bucket. update-function-code reads
              # it back from S3, so GetObject is needed on the same path.
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub "arn:aws:s3:::${ArtifactBucket}/*"
              # Update ONLY this function's code (and read it back for the status wait).
              # Not lambda:* — just these two.
              - Effect: Allow
                Action: [lambda:UpdateFunctionCode, lambda:GetFunction]
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:aisl-click-redirector"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:aisl-click-redirector:*"

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
